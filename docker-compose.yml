services:
  bento-pdf:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVICE_URL_BENTOPDF_8080
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:8080'
      interval: 5s
      timeout: 20s
      retries: 10
